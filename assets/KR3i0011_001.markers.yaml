  - {type: variant, offset: 206, length: 338, content: 見也使人知己不若金聲玉服忠以為利而強低任也孝利親也志以親為芬而能能利親不必得信言合於意也不以其言之當也使人視之必其行也其言之忻使士督之城得金佴司自作也與人遇人眾循狷言作嗛也為是為是之台害也弗為也廉作非也己惟為之知其也所司也令不為所作也非身弗行任士損己而益所為也為身之所惡以成人之所急勇志之所以敢也以其敢於是也命之不以其不敢於彼也害之力刑之所以奮也重之謂也下與重舊奮也生刑與知處也臥知無知也夢臥而以為然也平知無欲惡也惔然利所得而喜也得是而喜則是利也其害也非是也害所得而惡也得是而惡則是害也其利也非是也治求得也吾事治矣人有治南北譽明美也誹明惡也舉擬實也若石也者必以若名者也言出舉也告以之名舉彼實也故言也者諸口能之出貌者也貌若畫虎也言也謂言猶石致也且且自前言然也自前曰且自後曰已方然, WYG: 類大墨}
