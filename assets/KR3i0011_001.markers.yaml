  - {type: variant, offset: 4461, length: 1135, content: 中無為半猶端也前後取則端中也斫必半毋與非半不可斫也可無也有之而不可去說在嘗然可無也已給則當給不可無也久有窮無窮正而不可擔搖說在摶九丸無所處而不中縣摶也宇進無近說在敷傴不可偏舉字宇也進行者先敷近後敷遠行脩以久說在先後行者行者必先近而後遠遠近脩也先後久也民行脩必以久也一法者之相與也盡若方之相召合也說在方方貌盡俱有法而異或木或石不害其方之相台合也盡貌若方也物俱然狂舉不可以知異說在有牛與馬雖異以牛有齒馬有尾說牛之非馬也不可是俱有不偏有偏無有曰之牛與馬不類用牛有角馬無角是類不同也若舉牛有角馬無角以是為類之不同也是狂舉也猶牛有齒馬有尾不可牛馬之非牛與可之同說在兼或非牛而非牛也可則或非牛或牛而牛也可故曰牛馬非牛也未可牛馬牛也未可則或可或不可而曰牛馬牛也未可亦不可且牛不二馬不二而牛馬二則牛不非牛馬不非馬而牛馬非牛非馬無難循彼此循彼此與彼此同說在異正名者彼此彼此可彼彼止於彼此此止於此彼此不可彼且此也彼此亦可彼此止於彼此若是而彼此也則彼亦且此也唱和同患串說在功唱無過無所周若粺和無過使也不得已唱而不和是不學也智少而不學必寡和而不唱是不教也智多而不教適息使人奪人衣罪或輕或重使人予人酒功或厚或薄聞所不知若所知則兩知之說在告在外者所知也在室者所不知也或曰在室者之色若是其色是所不智若所智也猶白若黑也誰勝是若其色也若白者必白今也智其色之若白也故智其白也夫名以所明正所不智不以所不智疑所明若以尺度所不智長外親智也室中說智也以言為盡誖誖說在其言誖不可也出之人之言可是不誖則是有可也之人之言不可以當必不審惟吾謂非名也則不可說在反謂是霍可而猶之非夫霍也謂彼是是也不可謂者毋惟乎其謂彼猶惟乎其謂則吾謂不行彼若不惟其謂則其謂不行也無窮不害兼說在盈否南者有窮則可盡無窮則不可盡有窮無窮未可智則可盡不可盡未可智人之盈之否未可智人之可盡不可盡亦未可智而必人之可愛也誖人若不盈先無窮則人有窮也盡有窮無難盈無窮則無窮盡也盡其無窮無難不知其數而知其盡也說在明問者二智其數惡智愛民之盡之也或者遺乎其問也盡問人則盡愛其所問不知其所處不害愛之說在喪子者若智其數而智愛之盡之也無難仁義之為內外也內誖說在仵顏仁愛也義利也愛利此也所愛所利彼也愛利不相為內外所愛利亦不相為內外其為仁內也義外也舉愛與所利也是狂舉也若左目出右目入學之益也說在誹者以為不知學之無益也故告之也是使智學之無益也是教也以學為無益也教誖誹之可否不以眾寡說在可非論誹之可不可以理之可誹非雖多誹其誹是也其理不可非雖少誹非也今也謂多誹者不可是猶以長論短非誹者誖說在弗非不非己之誹也不非誹非可非也不可非也是不非誹也物箕甚不甚說在若是甚長甚短莫長於是莫短於是是之是也非是也者莫甚於是取下以求上也說在澤高下以善不善為度不若山澤處下善於處上下所請上也是是與是同說在不, WYG: 京師潘谷歙}
