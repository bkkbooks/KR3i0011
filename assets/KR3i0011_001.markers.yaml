  - {type: variant, offset: 18, length: 0, content: '', WYG: 可太軟當須有性謂之夾生煎火不可暴常以箆攪之不停手貴氣出不昏時時揚起視之以候厚薄直至一條如帶為度其墨膠不可單用或以牛膠魚膠阿膠參和之兗人舊以十月煎膠十一月造墨今旋煎旋用殊失之故潘谷一見陳相墨曰惜哉其用一生膠耳當以重煎者為良羅凡煤須用羅後魏賈思勰曰醇煙搗訖當以細絹篩堈内此物至輕微不宜露篩喜飛去不可不謹和凡和煤當在净密小室内不可通風傾膠於煤中央良久使自流}
