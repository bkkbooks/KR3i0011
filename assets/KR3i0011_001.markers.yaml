  - {type: variant, offset: 3548, length: 892, content: 謂有智焉有不智焉也若智之則當指之智告我則我智之兼指之以二也衡指之參直之也若曰必獨指吾所舉毋舉吾所不舉則指者固不能獨指所欲相不傳意若未校且其所智是也所不智是也則是智是之不智也惡得為一謂而有智焉有不智焉所知而弗能指說在春也虫也逃臣狗犬貴遺者春也虫也其執固不可指也逃臣不智其處狗犬不智其名也遺者巧弗能兩也知狗而自謂不知犬過也說在重智狗重智犬則過不重則不過通意後對說在不知其誰謂也問者曰子智𩥡乎應之曰何謂也彼曰𩥡施則智之若不問𩥡何謂徑應以弗智則過且應必應問之時若應長應有深淺天常中在與人長所存與存者於存與孰存說在室堂所存也其子存者也據在者而問室堂惡可存也主室堂而問存者孰存也是一主存者以問所存一主所存以問存者五行毋常勝說在宜火鑠金火多也金靡炭金多也無欲惡之為益損也說在宜欲惡傷生損壽說以少連是誰愛也嘗多粟或者欲不有能傷也若酒之於人也且智人利人愛也則惟智弗治也損而不害說在餘飽者去餘適足不害能害飽若傷麋之無脾也且有損而后益若瘧病之之於瘧也知而不以五路說在久智者以目見而目以火見而火不見惟以五路智久不當以目見若以火見必火熱說在頓謂火熱也非以火之熱我有若視日知其所不知說在以名取雜所智與所不智而問之則必曰是所智也是所不智也取去俱能之是兩智之也無不必待有說在所謂若無焉則有之而后無無天陷則無之而無擢慮不疑說在有無疑無謂蛇藏蛇今死而蠢蛇得之文死蛇可怛猶是也且然不可正而不害用工說在宜且然必然且已必已且用工而後已者必用工而後已均之絕不說在所均髮均縣輕而髮絕髮不均也均其絕也莫絕堯之義也生於今而處於古而異時說在所義二霍臛或以名視人或以實視人舉友富商也是以名視人也指是臛也是以實視人也堯之義也是聲也生於今所義之實處於古若殆於城門與於臧也狗犬也而殺狗非殺犬也可說在重狗犬也謂之殺犬可若兩脾使殷殿美說在使令使也我使亦使我我不使亦使我殿戈美亦使殿不美亦使殿荊之大其沈淺也說在具沉荊之具也則沈淺非荊淺也以檻楹為摶於以為無先知也說在意若易五之一楹之摶也見之其於意也不易先智意相也若楹輕於秋其於意也洋然推之意未可知說在可用過仵段錐椎俱事於履可用也成繪屢過椎與成椎過繪屢同過件仵也一少於二而多於五說在建住位五有一焉一有五焉, WYG: 月}
