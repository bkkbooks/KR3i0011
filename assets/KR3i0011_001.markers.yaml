  - {type: variant, offset: 6, length: 0, content: '', WYG: 名曰一㑹候窑冷採煤成磈成片頭煤深者曰逺火外者曰近火煤不堪用凡煤貴輕舊東山煤輕西山煤重今則西山煤輕東山煤重凡器大而輕者良器小而重者否凡振之而應手者良擊之而有聲者良凡以手試之而入人紋理難洗者良以物試之自然有光成片者良凡墨有穿眼者謂之滲眼煤雜窑病}
