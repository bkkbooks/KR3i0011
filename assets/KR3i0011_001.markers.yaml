  - {type: variant, offset: 7086, length: 1412, content: 語經也非白馬焉執駒焉求說之舞說非也漁大之舞大非也為暴人語天之為是也而性為暴人歌天之為非也諸陳執既有所為而我為之陳執執之所為因吾所為也若陳執未有所為而我為之陳執陳執因吾所為也暴人以為我為天之志以人非為是也而性不可正聖人之為天下也聖人惡疾病不惡危難正體不動欲人之利也非惡其弱也諸聖人所先為人欲惡者人右必以其請得焉諸所遭執而欲惡生者人不必以其請得焉聖人之拊瀆也仁而無利愛利愛生於慮昔者之慮也非今日之慮也昔者之愛人非今之愛人也愛獲之愛人也生於慮獲之利非慮臧之利也而愛臧之愛人也乃愛獲之愛人也去其愛而天下利弗能去也昔之知棓今日之知暀三物必具然後足以生天下之利驩聖人有愛而無利俔日之言也乃客之言也天下無人子墨子之言也猶在或壽或卒其利天下相若義利不義害志功為辯志功不可以相從也貴為天子其利人不厚於正夫二子事親或遇熟或遇凶其事親也相若非彼其行益也非加也外執無能厚吾利者一日而百萬生愛不加厚藉藏也死而天下害吾特養臧也萬倍吾愛臧也不加厚愛二世有厚薄而愛二世相若愛眾眾世與愛寡世相若兼愛之有相若愛尚世與愛後世一若今之世人也之鬼非人也兄之鬼兄也為天下厚禹為禹之之人也為天下厚愛禹乃為禹之人愛也厚禹之為加於天下而厚禹不加於天下若惡盜之為加於天下而惡盜不加於天下愛之相若擇而殺其一人智是之世之有盜也盡愛是世智是室之有盜也不盡是室也智其一人之盜也不盡是二人雖其一人之盜茍不智其所在盡非殺臧也專殺盜非殺盜也凡學愛人利於天下相若無擇也死生利若一無擇也殺一人以存天下非殺一人以利天下也殺己以存天下是殺己以利天下也小仁與大仁行厚相若於事為之中而權輕重之謂求求為之非為之也求為義非為義也天之愛人也薄於聖人之愛人也其利人也厚於聖人之利人也大人之愛小人也薄於小人之愛大人也其利小人也厚於小人之利大人也以臧為其親也而愛之非愛其親也以臧為其親也而利之非利其親也以樂為利其子而為其子欲之愛其子也以樂為利其子而為其子求之非利其子也興利除害也於所體之中而權輕重謂之權權非為是也非非為非也權正也斷指以存腕利之中取大害之中取小也害之中取小也非取害也取利也其所取者人之所執也遇盜人而斷指腕以免身利也其遇盜人害也斷指與斷腕害之中取小也不得已而欲之非欲之非欲之也而正之也利之中取大非不得已也害之中取小不得已也所未有而取焉是利之中取大也於所既有而棄焉是害之中取小也厚親不稱行而顧行義可厚厚之義可薄薄之謂倫列德行君上老長親戚此皆所厚也為長厚不為幼薄親厚厚親薄薄親至薄不至義厚親不稱行而顧行強子深其深淺其淺益其益尊其尊聖人之法死亡親為天下也厚親分也以死亡之體渴不為己之可學也興利有厚薄而毋倫列之興利為己愛人不外己己在所愛之中己在所愛愛加於己倫列之愛己愛人也臧之愛己非為愛己之人也厚不外己愛無厚薄舉己非賢也智親之一利未為孝也亦不至於智不為己之利於親也愛人非為譽也利人也為其人也富人非為其人也有為也以富人富人也治人有為鬼焉為賞譽利一人非為賞譽利人也亦不至無貴於人愛人之親若愛其親惡人之害也聖人不為其室臧之故在於臧聖人不得為子之事兼愛相若一愛相若浸淫之辭其類在於鼓栗聖人也之為天下也其類在於追迷或壽或卒其利天下指相若其類在譽石一日而百萬生愛不加厚其類在惡害愛二世有厚薄而愛二世相若其類在蛇文愛之相若擇而殺其一人其類在阬下之鼠小仁與大仁行厚相若其類在申凡興利除害也其類在漏雍厚親不稱行而顧行其類在江上井不為己之可學也其類在獵走徒愛人非為譽也其類在逆旅愛人之親若愛其親其類在官茍兼愛相若一愛相若其類在死也, WYG: ''}
