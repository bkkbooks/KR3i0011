  - {type: variant, offset: 5597, length: 1065, content: 不是則是且是焉今是文止於是而不止於是故是不止是不止則是而不止焉今是不止於是而止於是故止與是不止同說也名實名實不必名合苟是石也白敗是石也盡與白同是石也唯大不與大同諸非以舉量數命者敗之盡是也故一人指非一人也是一人之指乃是一人也方之一面非方也方木之面方木也有有於秦馬有有於馬也智來者之馬也是有便謂焉也以形貌命者必智是之某也焉智某也不可以形貌命者唯不智是之某也智某可也諸以居運命者苟入於其中者皆是也去之因非也諸以居運命者若鄉里齊荊者皆是諸以形貌命者若山丘室廟者皆是也智與意異是璜也是玉也意楹非意木也意是楹之木也意指之人也非意人也意獲也乃意禽也一曰乃是而然二曰乃是而不然三曰遷四曰或也者不盡也假者今不然也效者為之法也所效者所以為之法也故中效則是也不中效則非也此效也夫辯者將以明是非之分審治亂之紀明同異之處察名實之理處利害決嫌疑焉摹略萬物之然論求群言之比是猶謂也者同也吾豈謂也者異也重同具同連同同類之同同名之同丘同鮒同是之同然之同同根之同有非之異有不然之異有其異也為其同也為其同也為其異長人之異與短人之同其貌同者也故同指之人也與首之人也異人之體非一貌者也故異將劍與挺劍異劍以形貌命者也其形不一故異楊木之木與桃木之木也同小圜之圜與大圜之圜同方至尺之不至也與不至鐘千里之至不異其不至同者遠近之謂也聞耳之聰也循所聞而得其意心也之察也言口之利也執所言而意得見心之辯也音利察次山端比因至優指復次察聲端名因請復正夫辭以故生以理長以類行者也立辭而不明於其所生長忘也今人非道無所行唯有強股肱而不明於道其困也可立而待也夫辭以類行者也立辭而不明於其類則必困矣故以名舉實以辭抒意以說出故以類取以類予有諸己不非諸人無諸己不求諸人辟也者舉也物而以明之侔也者比辭而俱行也援也者曰子然我奚獨不可以然也推也者以其所不取之同於其所取者予之也夫物有以同而不率遂也同辭之侔也有所至而正其然也有所以然也其然也同其所以然不必同其取之也有所以取之其取之也同其所以取之不必同是故辟侔援推之辭行而異轉而危遠而失流而離本則不可不審也不可常用也故言多方殊類異故則不可偏觀也夫物或乃是而然或是而不然或不是而然或一周而一不周或一是而一不是非也白馬馬也乘白馬乘馬也驪馬馬也乘驪馬乘馬也獲人也愛獲愛人也臧人也愛臧愛人也此乃是而然者也獲之視親人也獲事其親非事人也其弟美人也愛弟非愛美人也車木也乘車非乘木也船木也入船非入木也盜人人也多盜非多人也無盜非無人也奚以明之惡多盜非惡多人也欲無盜非欲無人也世相與共是之若若是則雖盜人人也愛盜非愛人也不愛盜非不愛人也殺盜人非殺人也無難盜無難矣此與彼同類世有彼而不自非也, WYG: 張谷}
