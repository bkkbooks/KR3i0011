  - {type: variant, offset: 3, length: 0, content: '', WYG: 不過二三株品惟上上根幹肥大脂出若珠者曰脂松品惟上中可掲}
  - {type: variant, offset: 3, length: 0, content: '', krp: 不過二三株品惟上上根幹肥大脂出若珠者曰脂松品惟上中可掲}
  - {type: variant, offset: 4, length: 1, content: 後, WYG: 起視之而明者曰掲明松品惟上下明不足而紫者曰紫松品惟中上礦而挺直者曰籖松品惟中中明不足而黄者曰黄明松品惟中下無膏油而漫若糖苴然者曰糖松品惟下上無膏油而類杏者曰杏松品惟下中其出歴青之餘者曰脂片松品惟下下其降此外不足品第煤古用立窑髙丈餘其竈寛腹小口不出突於􅍳面覆以五斗甕又益以五甕大小為差穴底相乗亦視大小為差每層泥塗惟密約甕中煤厚住火以雞羽掃取之或為五品或為二品二品不取最先一器今用卧窑疊石累礦取岡嶺髙下形勢向背而或長百尺􅀷五寸脊髙三尺口大一尺小項八尺大項四十尺胡口二尺身五十尺胡口亦曰咽口口身之末曰頭每以松三枝或五枝徐爨之五枝以上煙暴煤麄以下則煙緩煤細枝數益少益良有白灰去之凡七晝夜而}
