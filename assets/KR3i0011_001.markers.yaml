markers:
  front:
  - {type: variant, offset: 0, length: 1, content: 故, WYG: 欽定四庫全書墨經宋晁季一撰松古用松煙石墨二種石墨自晉魏以後無聞松煙之製尚矣漢貴扶風隃糜終南山之松蔡質漢官儀曰尚書令僕丞郎月賜隃糜大墨一枚小墨一枚晉貴九江廬山之松衛夫人筆陣圖曰墨取廬山松煙唐則易州潞州之松上黨松心尤先見貴後唐則宣州黄山歙州黟山松羅山之松李氏以宣歙之松類易水之松今兖州泰山徂徕山島山嶧山沂州龜山蒙山密州九仙山登州牢山鎮府五臺邢州潞州太行山遼州遼陽山汝州竈君山随州桐栢山衛州共山衢州柯山池州九華山及宣歙諸山皆産松之所兖沂登密之間山總謂之東山鎮府之山則曰西山自昔東山之松色澤肥膩性質沉重品惟上上然今不復有今其所有者纔十餘嵗之松不可比西山之大松蓋西山之松與易水之松相近乃古松之地與黄山黟山羅山之松品惟上上遼陽山竈君山桐栢山可甲乙九華山品中共山柯山品下大概松根生茯苓穿山石而出者透脂松嵗}
