  - {type: variant, offset: 3120, length: 279, content: 引古也是猶自舟中引橫也倚者不可正說在剃梯倍拒堅屈倚焉則不正推堆之必往住說在廢材並石絫石耳夾寢者法廢也方石去地尺關石於其下縣絲於其上使適至方石不下柱也膠絲去石挈也絲絕引也木變而名易收也買無貴說在反其賈刀糴相為賈刀輕則糴不貴刀重則糴不易王刀無變糴有變歲變糴則歲變刀若鬻子賈宜則售說在盡盡也者盡去其所以不售也其所以不售去則售正賈也宜不宜正欲不欲若敗邦賣室嫁子無說而懼說在弗止子在軍不必其死生聞戰亦不必其生前也不懼今也懼或過名也說在實知是之非此也有知是之不在此也然而謂此南北過而以已為然始也謂此南方故今也謂此南方知知之否之足用也誖說在無以也論之非智無以也謂辯無勝必不, WYG: 時}
