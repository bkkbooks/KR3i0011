body:
  text: 故所得而後成也小故有之不必然無之必不然最前之體也若有端大故有之必然無之必不然若見之成見也體分於兼也若二之一尺之端也知材也知也者所以知也而必知若明慮求也慮也者以其知有求也而不必得之若睨知接也知也者以其知過物而能貌之若見智明也智也者以其知論物而其知之也著若明仁體愛也愛己者非為用己也不若愛馬義利也志以天下為芬而能能利之不必用禮敬也貴者公賤者名而俱有敬僈焉等異論也行為也所為不善名行也所為善名巧也若為盜實誠榮也其志氣之見也使人知己不若金聲玉服忠以為利而強低任也孝利親也志以親為芬而能能利親不必得信言合於意也不以其言之當也使人視之必其行也其言之欣使士督之城得金佴司自作也與人遇人衆循狷言作嗛也為是為是之台害也弗為也廉作非也己惟為之知其也所司也令不為所作也非身弗行任士損己而益所為也為身之所惡以成人之所急勇志之所以敢也以其敢於是也命之不以其不敢於彼也害之力刑之所以奮也重之謂也下與重舊奮也生刑與知處也臥知無知也夢臥而以為然也平知無欲惡也惔然利所得而喜也得是而喜則是利也其害也非是也害所得而惡也得是而惡則是害也其利也非是也治求得也吾事治矣人有治南北譽明美也誹明惡也舉擬實也若石也者必以若名者也言出舉也告以之名舉彼實也故言也者諸口能之出貌者也貌若畫虎也言也謂言猶石致也且且自前言然也自前曰且自後曰已方然亦且若殆姑君臣萌通約也功利民也不待時惟利無功若衣裘賞上報下之功也罪犯禁也不在禁惟害無罪罰上報下之罪也同異而俱如於之一也二人而俱見是楹也若事君楹之生商不可必也久彌異時也今古今合旦莫守宇彌異所也東西家蒙南北窮或有前不容尺也或不容尺有窮莫不容尺無窮也盡莫不然也俱止始當時也動時或有久或無久始當無久化徵易也若蛙為鶉損偏去也偏也者兼之禮體也其體或去或存謂其存者損儇枳枸也句貌也運易也區穴若斯貌常動或徙也偏祭徙者戶樞免琵兔蝨止以久也無久之不止當牛非馬若矢過楹有久之不止當馬非馬若人過梁必不已也謂商熟者也若弟兄一然者一不然者必止不必也是非必也平同高也同長以正相盡也楗與狂之同長也心正中所自同長也自是往相若也厚有所大也惟端無所大日中正南也直參也圜一中同長也規寫撲也方柱匡隅四歡雜也矩見撲也倍為二也二尺與尺俱去一端是無同也端體之無厚而最前者也有間不反中也謂夾之者也間不及旁也謂所夾者也尺前於區穴而後於端不夾於端與區穴及及非齊之及也纑間虛也虛也者兩木之間謂其無木者也盈莫不有也無盈無厚於尺無所往而不得二堅白不相外也異處不相盈相非是相外也攖相得也尺與尺俱不盡端無與端俱盡尺與端或盡或不盡堅白之攖相盡體攖不相盡似仳有以相攖有不相攖也兩有端而后可次無間而不攖相攖也端無厚而后可法所若而然也意規員三也俱可以為法佴因所然也然也者貌若法也説所以明也攸反不可兩不可也凡牛樞非牛兩也無以非也辨爭攸反也辨勝當也或謂之牛或謂之非牛是爭彼反也是不俱當不俱當必或不當不若當犬為窮知而縣於欲也欲斷其指智不知其害是智之罪也若智之慎之也無遺其害也而猶欲斷之則離之是猶食脯也騷脯之利害未可知也欲食脯而騷則食之也是不以所疑止所欲也牆外之利害未可知也趨之而得力刀則弗趨也是以所疑止所欲也觀窮知而縣於欲之理斷脯而非智也斷指而非愚也所為與所不與為相疑也非謀也已成亡為衣成也治病亡也使謂故令謂也不必成濕故也必待所為之成也名達類私物達也有實必待之多名也命之馬類也若實也者必以是名也命之臧私也是名也止於是實也聲出口俱有名若姓宇字謂移舉加麗狗犬命移也狗犬舉也叱狗加也知聞説親名實合為傳受之聞也方不運説也身觀焉親也所以謂名也所謂實也名實耦合也志行為也聞慱傳親或告之傳也身觀焉親也見體盡時特者體也二者盡也合正宜必與立反中志工正也臧之為宜也非彼必不有必也聖者用而勿必必也者可而勿疑仗反者兩而勿偏欲正權利且惡正權害為存亡易蕩治化中敵存也病亡也買鬻易也霄盡蕩也順長治也蛙買化也同重體合類二名一實重同也不外於兼體同也俱處於室合同也有以同類同也異二不體不合不類二必異二也不連屬不體也不同所不合也不有同不類也同異交得放有無多少去就堅柔死生長少兩絶勝是非成未俱適存亡姓故貴賤交得於放福家良智有無也比度多少也免虭兔蝨還園去就也鳥折用桐堅柔也劍尤方中死生也處室子子母長少也兩絶勝白黑也中央旁也論行學實是非也難宿成未也兄弟俱適也身處志往存亡也霍為姓故也賈宜貴賤也諾不一利用超城員止也相從相去先知是可五色長短前後輕重援執服執誽巧轉則求其故難成言務成之九執則求執之法法同則觀其同取同觀巧轉法異則觀其宜取此擇彼問故觀宜以人之有黑者有不黑者也止黑人與以有愛於人有不愛於人止愛人是孰宜止因以別道彼舉然者以為此其然也則舉不然者而問之若聖人有非而不非正無非五諾皆入於知有説過五諾若員無直無説用五諾若自然矣止類以行人説在同彼以此其然也説是其然也我以此其不然也疑是其然也駟異説推類之難説在之止大小物盡謂四足獸與生鳥與物盡與大小也此然是必然則俱為麋同名二與鬥愛食與招白與視眇麗與夫與履一偏棄之謂而固是也説在因俱鬥不俱二三二與鬥也包肝肺子愛也橘茅食與抬招也白馬多白視眇馬不多眇白與眇也為麗不必麗其裴類不必麗其與暴也為非以人是不為非若為夫以勇不為夫為屨以買衣為屨夫與屨也二與一亡不與一在偏去未有之實也而後謂之無之實也則無謂也不若敷與美謂是則是固美也謂也則是非美無謂則報反也不可偏去而二説在見與俱見一與二廣與修見見離一二不相盈廣修堅白不能而不害説在周舉重不與針非力之任也為握敵者之觭倍非智之任也若耳目異類不比説在量木與夜孰長智與粟孰多爵親行賈四者孰貴麋與霍孰高麋與霍孰霍蝨與瑟孰瑟偏去莫加少説在故俱一無變假必悖説在不然假必非也而後假狗假霍也猶氏霍也物之所以然與所以知之與所以使人知之不必同説在病或傷之然也見之智也吉告之使智也疑説在逢循遇過蓬為務則去士為牛廬者夏寒蓬逢也舉之則輕廢之則重非有力也若石羽沛從削非巧也若石羽楯循也鬥者之敝也以飲酒若以日中是不可智也愚遇也智與以已為然也與愚過也合與一或復或否説在拒樞合水土火火離然火合之府木木離木若識糜與魚之數惟所利區物一體也説在俱一惟是俱一若牛馬四足惟是當牛馬數牛數馬則牛馬二數牛馬則牛馬一若數指指五而五一宇或徙説在長長徙而有處宇宇久不堅白説在南北在旦有在莫宇徙久無久與宇堅白説在因堅得白必相盈也在諸其所然未然者説在於是堯善治自今在諸古也自古在之今則堯不能治也景不徙説在改為光至景亡若在盡古息景二説在重二光夾一光一光者景也景到在午有端與景長説在端光之入句若射下者之入也高高者之入也下足蔽下光故成景於止上首蔽上光故成景於下在遠近有端與於光故景運內也景迎日説在轉日之光反燭人則景在日與人之間景之大小説在地杝正遠近木杝景短大木正景長小大火小於木則景大於木非獨小也遠近臨鑑而立景到多而若少説在寡區正鑒景寡貌能白黑遠近杝正異於光鑒景當俱就去參當俱用向北鑒者之臭澤於鑒無所不鑒景之澤無數而必過正故同處其體俱然鑒分鑑位窪量景一小而易一大而正説在中之外內中之內鑒者近中則所鑒大景亦大遠中則所鑒小景亦小而必正起於中緣正而長其直也中之外鑒者近中則所鑒大景亦大遠中則所鑒小景亦小而必易合於中而長其直也鑑團景一小天一大而必正説在鑒者近則所鑒大景亦大亦其遠所鑒小景亦小而必正景過正故招貞負而不撓説在勝衡木如加重焉而不撓極勝重也右校交繩無加焉而撓極不勝重也衡説在得加重於其一旁必捶權重相若也相衡則本短標長兩加焉重相若則摽必下標得權也栔與枝收板説在薄有力也之引無力也不止所挈之止於施也繩制掣挈之也若以錐刺之挈成重者下短輕者上上者愈得下者愈亡繩直權重相若則止矣收上者愈喪下者愈得上者權中盡則遂隊墜挈車梯兩輪高兩輪為輇車梯也重其前弦其前載弦其車古而縣重於其前是梯挈且挈則行凡重上弗挈下弗收旁弗劫則下直手也或害之也流梯者不得下直也今也廢尺於平地重不下無倣也若夫繩之引古也是猶自舟中引橫也倚者不可正説在剃梯倍拒堅屈倚焉則不正推堆之必往住説在廢材並石絫石耳夾寢者法廢也方石去地尺關石於其下縣絲於其上使適至方石不下柱也膠絲去石挈也絲絶引也木變而名易收也買無貴説在反其賈刀糴相為賈刀輕則糴不貴刀重則糴不易王刀無變糴有變歲變糴則歲變刀若鬻子賈宜則售説在盡盡也者盡去其所以不售也其所以不售去則售正賈也宜不宜正欲不欲若敗邦賣室嫁子無説而懼説在弗止子在軍不必其死生聞戰亦不必其生前也不懼今也懼或過名也説在實知是之非此也有知是之不在此也然而謂此南北過而以已為然始也謂此南方故今也謂此南方知知之否之足用也悖説在無以也論之非智無以也謂辨無勝必不當説在辨所謂非同也則異也同則或謂之狗其或謂之犬也異則或謂之牛牛其或謂之馬也俱無勝是不辨也辨也者或謂之是或謂之非當者勝也無不讓也不可説在始讓者酒未讓始也不可讓也於一有知焉有不知焉説在存石一也堅白二也而在石故有智焉有不智焉可有指於二而不可逃説在以二絫參子智是有智是吾所先舉重則子智是而不智吾所先舉也是一謂有智焉有不智焉也若智之則當指之智告我則我智之兼指之以二也衡指之參直之也若曰必獨指吾所舉毋舉吾所不舉則指者固不能獨指所欲相不傳意若未校且其所智是也所不智是也則是智是之不智也惡得為一謂而有智焉有不智焉所知而弗能指説在春也蟲也逃臣狗犬貴遺者春也蟲也其執固不可指也逃臣不智其處狗犬不智其名也遺者巧弗能兩也知狗而自謂不知犬過也説在重智狗重智犬則過不重則不過通意後對説在不知其誰謂也問者曰子智𩥡乎應之曰何謂也彼曰𩥡施則智之若不問𩥡何謂徑應以弗智則過且應必應問之時若應長應有深淺天常中在與人長所存與存者於存與孰存説在室堂所存也其子存者也據在者而問室堂惡可存也主室堂而問存者孰存也是一主存者以問所存一主所存以問存者五行毋常勝説在宜火鑠金火多也金靡炭金多也無欲惡之為益損也説在宜欲惡傷生損壽説以少連是誰愛也嘗多粟或者欲不有能傷也若酒之於人也且智人利人愛也則惟智弗治也損而不害説在餘飽者去餘適足不害能害飽若傷麋之無脾也且有損而后益若瘧病之之於瘧也知而不以五路説在久智者以目見而目以火見而火不見惟以五路智久不當以目見若以火見必火熱説在頓謂火熱也非以火之熱我有若視日知其所不知説在以名取雜所智與所不智而問之則必曰是所智也是所不智也取去俱能之是兩智之也無不必待有説在所謂若無焉則有之而后無無天陷則無之而無擢慮不疑説在有無疑無謂蛇藏蛇今死而蠢蛇得之文死蛇可怛猶是也且然不可正而不害用工説在宜且然必然且已必已且用工而後已者必用工而後已均之絶不説在所均髮均縣輕而髮絶髮不均也均其絶也莫絶堯之義也生於今而處於古而異時説在所義二霍臛或以名視人或以實視人舉友富商也是以名視人也指是臛也是以實視人也堯之義也是聲也生於今所義之實處於古若殆於城門與於臧也狗犬也而殺狗非殺犬也可説在重狗犬也謂之殺犬可若兩脾使殷殿美説在使令使也我使亦使我我不使亦使我殿戈美亦使殿不美亦使殿荊之大其沈淺也説在具沉荊之具也則沈淺非荊淺也以檻楹為摶於以為無先知也説在意若易五之一楹之摶也見之其於意也不易先智意相也若楹輕於秋其於意也洋然推之意未可知説在可用過仵段錐椎俱事於履可用也成繪屢過椎與成椎過繪屢同過件仵也一少於二而多於五説在建住位五有一焉一有五焉十二焉非半弗斫則不動説在端斫半進前取也前則中無為半猶端也前後取則端中也斫必半毋與非半不可斫也可無也有之而不可去説在嘗然可無也已給則當給不可無也久有窮無窮正而不可擔搖説在摶九丸無所處而不中縣摶也宇進無近説在敷傴不可偏舉字宇也進行者先敷近後敷遠行修以久説在先後行者行者必先近而後遠遠近修也先後久也民行修必以久也一法者之相與也盡若方之相召合也説在方方貌盡俱有法而異或木或石不害其方之相台合也盡貌若方也物俱然狂舉不可以知異説在有牛與馬雖異以牛有齒馬有尾説牛之非馬也不可是俱有不偏有偏無有曰之牛與馬不類用牛有角馬無角是類不同也若舉牛有角馬無角以是為類之不同也是狂舉也猶牛有齒馬有尾不可牛馬之非牛與可之同説在兼或非牛而非牛也可則或非牛或牛而牛也可故曰牛馬非牛也未可牛馬牛也未可則或可或不可而曰牛馬牛也未可亦不可且牛不二馬不二而牛馬二則牛不非牛馬不非馬而牛馬非牛非馬無難循彼此循彼此與彼此同説在異正名者彼此彼此可彼彼止於彼此此止於此彼此不可彼且此也彼此亦可彼此止於彼此若是而彼此也則彼亦且此也唱和同患串説在功唱無過無所周若稗和無過使也不得已唱而不和是不學也智少而不學必寡和而不唱是不教也智多而不教適息使人奪人衣罪或輕或重使人豫人酒功或厚或薄聞所不知若所知則兩知之説在告在外者所知也在室者所不知也或曰在室者之色若是其色是所不智若所智也猶白若黑也誰勝是若其色也若白者必白今也智其色之若白也故智其白也夫名以所明正所不智不以所不智疑所明若以尺度所不智長外親智也室中説智也以言為盡悖悖説在其言悖不可也出之人之言可是不悖則是有可也之人之言不可以當必不審惟吾謂非名也則不可説在反謂是霍可而猶之非夫霍也謂彼是是也不可謂者毋惟乎其謂彼猶惟乎其謂則吾謂不行彼若不惟其謂則其謂不行也無窮不害兼説在盈否南者有窮則可盡無窮則不可盡有窮無窮未可智則可盡不可盡未可智人之盈之否未可智人之可盡不可盡亦未可智而必人之可愛也悖人若不盈先無窮則人有窮也盡有窮無難盈無窮則無窮盡也盡其無窮無難不知其數而知其盡也説在明問者二智其數惡智愛民之盡之也或者遺乎其問也盡問人則盡愛其所問不知其所處不害愛之説在喪子者若智其數而智愛之盡之也無難仁義之為內外也內悖説在仵顏仁愛也義利也愛利此也所愛所利彼也愛利不相為內外所愛利亦不相為內外其為仁內也義外也舉愛與所利也是狂舉也若左目出右目入學之益也説在誹者以為不知學之無益也故告之也是使智學之無益也是教也以學為無益也教悖誹之可否不以衆寡説在可非論誹之可不可以理之可誹非雖多誹其誹是也其理不可非雖少誹非也今也謂多誹者不可是猶以長論短非誹者悖説在弗非不非己之誹也不非誹非可非也不可非也是不非誹也物箕甚不甚説在若是甚長甚短莫長於是莫短於是是之是也非是也者莫甚於是取下以求上也説在澤高下以善不善為度不若山澤處下善於處上下所請上也是是與是同説在不州不是則是且是焉今是文止於是而不止於是故是不止是不止則是而不止焉今是不止於是而止於是故止與是不止同説也名實名實不必名合苟是石也白敗是石也盡與白同是石也唯大不與大同諸非以舉量數命者敗之盡是也故一人指非一人也是一人之指乃是一人也方之一面非方也方木之面方木也有有於秦馬有有於馬也智來者之馬也是有便謂焉也以形貌命者必智是之某也焉智某也不可以形貌命者唯不智是之某也智某可也諸以居運命者苟入於其中者皆是也去之因非也諸以居運命者若鄉里齊荊者皆是諸以形貌命者若山丘室廟者皆是也智與意異是璜也是玉也意楹非意木也意是楹之木也意指之人也非意人也意獲也乃意禽也一曰乃是而然二曰乃是而不然三曰遷四曰或也者不盡也假者今不然也效者為之法也所效者所以為之法也故中效則是也不中效則非也此效也夫辨者將以明是非之分審治亂之紀明同異之處察名實之理處利害決嫌疑焉摹略萬物之然論求群言之比是猶謂也者同也吾豈謂也者異也重同具同連同同類之同同名之同丘同鮒同是之同然之同同根之同有非之異有不然之異有其異也為其同也為其同也為其異長人之異與短人之同其貌同者也故同指之人也與首之人也異人之體非一貌者也故異將劍與挺劍異劍以形貌命者也其形不一故異楊木之木與桃木之木也同小圜之圜與大圜之圜同方至尺之不至也與不至鐘千里之至不異其不至同者遠近之謂也聞耳之聰也循所聞而得其意心也之察也言口之利也執所言而意得見心之辨也音利察次山端比因至優指復次察聲端名因請復正夫辭以故生以理長以類行者也立辭而不明於其所生長忘也今人非道無所行唯有強股肱而不明於道其困也可立而待也夫辭以類行者也立辭而不明於其類則必困矣故以名舉實以辭抒意以説出故以類取以類豫有諸己不非諸人無諸己不求諸人辟也者舉也物而以明之侔也者比辭而俱行也援也者曰子然我奚獨不可以然也推也者以其所不取之同於其所取者豫之也夫物有以同而不率遂也同辭之侔也有所至而正其然也有所以然也其然也同其所以然不必同其取之也有所以取之其取之也同其所以取之不必同是故辟侔援推之辭行而異轉而危遠而失流而離本則不可不審也不可常用也故言多方殊類異故則不可偏觀也夫物或乃是而然或是而不然或不是而然或一周而一不周或一是而一不是非也白馬馬也乘白馬乘馬也驪馬馬也乘驪馬乘馬也獲人也愛獲愛人也臧人也愛臧愛人也此乃是而然者也獲之視親人也獲事其親非事人也其弟美人也愛弟非愛美人也車木也乘車非乘木也船木也入船非入木也盜人人也多盜非多人也無盜非無人也奚以明之惡多盜非惡多人也欲無盜非欲無人也世相與共是之若若是則雖盜人人也愛盜非愛人也不愛盜非不愛人也殺盜人非殺人也無難盜無難矣此與彼同類世有彼而不自非也墨者有此而非之無也故焉所謂內膠外閉與不毋空乎內膠而不解也此乃是而不殺然者也且夫讀書非書也好讀書好書也且鬥雞非雞也好鬥雞非好雞也且入井非入井也止且入井紙入井也且出門非出門也止且出門止出門也若若是且夭非夭也壽止且夭止夭也有命非命也非執有命非命也無難矣此與彼同世有彼而不自非也墨者有此而罪非之無也故焉所謂內膠外閉與心毋空乎內膠而不解也此乃不是而然者也愛人待周愛人而後為愛人不愛人不待周不愛人不失周愛因為不愛人矣乘馬不待周乘馬然後為乘馬也有乘於馬因為乘馬矣逮至不乘馬待周不乘馬而後不乘馬而後不乘馬此一周而一不周者也居於國則為居國有一宅於國而不為有國桃之實桃也棘之實非棘也問人之病問人也惡人之病非惡人也人之鬼非人也兄之鬼兄也祭人之鬼非祭人也祭兄之鬼乃祭兄也之馬之目盼眇則為謂之馬眇之馬之目大而不謂之馬大之牛之毛黃則謂之牛黃之牛之毛衆而不謂之牛衆一馬馬也二馬馬也馬四足者一馬而四足也非兩馬而四足也一馬馬也馬或自白者二馬而或白也非一馬而或白此乃一是而一非者也語經語經也非白馬焉執駒焉求説之舞説非也漁大之舞大非也為暴人語天之為是也而性為暴人歌天之為非也諸陳執既有所為而我為之陳執執之所為因吾所為也若陳執未有所為而我為之陳執陳執因吾所為也暴人以為我為天之志以人非為是也而性不可正聖人之為天下也聖人惡疾病不惡危難正體不動欲人之利也非惡其弱也諸聖人所先為人欲惡者人右必以其請得焉諸所遭執而欲惡生者人不必以其請得焉聖人之拊瀆也仁而無利愛利愛生於慮昔者之慮也非今日之慮也昔者之愛人非今之愛人也愛獲之愛人也生於慮獲之利非慮臧之利也而愛臧之愛人也乃愛獲之愛人也去其愛而天下利弗能去也昔之知棓今日之知暀三物必具然後足以生天下之利歡聖人有愛而無利俔日之言也乃客之言也天下無人子墨子之言也猶在或壽或卒其利天下相若義利不義害志功為辨志功不可以相從也貴為天子其利人不厚於正夫二子事親或遇熟或遇凶其事親也相若非彼其行益也非加也外執無能厚吾利者一日而百萬生愛不加厚藉藏也死而天下害吾特養臧也萬倍吾愛臧也不加厚愛二世有厚薄而愛二世相若愛衆衆世與愛寡世相若兼愛之有相若愛尚世與愛後世一若今之世人也之鬼非人也兄之鬼兄也為天下厚禹為禹之之人也為天下厚愛禹乃為禹之人愛也厚禹之為加於天下而厚禹不加於天下若惡盜之為加於天下而惡盜不加於天下愛之相若擇而殺其一人智是之世之有盜也盡愛是世智是室之有盜也不盡是室也智其一人之盜也不盡是二人雖其一人之盜茍不智其所在盡非殺臧也專殺盜非殺盜也凡學愛人利於天下相若無擇也死生利若一無擇也殺一人以存天下非殺一人以利天下也殺己以存天下是殺己以利天下也小仁與大仁行厚相若於事為之中而權輕重之謂求求為之非為之也求為義非為義也天之愛人也薄於聖人之愛人也其利人也厚於聖人之利人也大人之愛小人也薄於小人之愛大人也其利小人也厚於小人之利大人也以臧為其親也而愛之非愛其親也以臧為其親也而利之非利其親也以樂為利其子而為其子欲之愛其子也以樂為利其子而為其子求之非利其子也興利除害也於所體之中而權輕重謂之權權非為是也非非為非也權正也斷指以存腕利之中取大害之中取小也害之中取小也非取害也取利也其所取者人之所執也遇盜人而斷指腕以免身利也其遇盜人害也斷指與斷腕害之中取小也不得已而欲之非欲之非欲之也而正之也利之中取大非不得已也害之中取小不得已也所未有而取焉是利之中取大也於所既有而棄焉是害之中取小也厚親不稱行而顧行義可厚厚之義可薄薄之謂倫列德行君上老長親戚此皆所厚也為長厚不為幼薄親厚厚親薄薄親至薄不至義厚親不稱行而顧行強子深其深淺其淺益其益尊其尊聖人之法死亡親為天下也厚親分也以死亡之體渴不為己之可學也興利有厚薄而毋倫列之興利為己愛人不外己己在所愛之中己在所愛愛加於己倫列之愛己愛人也臧之愛己非為愛己之人也厚不外己愛無厚薄舉己非賢也智親之一利未為孝也亦不至於智不為己之利於親也愛人非為譽也利人也為其人也富人非為其人也有為也以富人富人也治人有為鬼焉為賞譽利一人非為賞譽利人也亦不至無貴於人愛人之親若愛其親惡人之害也聖人不為其室臧之故在於臧聖人不得為子之事兼愛相若一愛相若浸淫之辭其類在於鼓栗聖人也之為天下也其類在於追迷或壽或卒其利天下指相若其類在譽石一日而百萬生愛不加厚其類在惡害愛二世有厚薄而愛二世相若其類在蛇文愛之相若擇而殺其一人其類在坑下之鼠小仁與大仁行厚相若其類在申凡興利除害也其類在漏雍厚親不稱行而顧行其類在江上井不為己之可學也其類在獵走徒愛人非為譽也其類在逆旅愛人之親若愛其親其類在官茍兼愛相若一愛相若其類在死也
